<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wumpus World — Knowledge-Based Agent</title>
<style>
  /* ---- Basic reset and font setup ---- */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', monospace; /* monospace gives it a nice "terminal" feel */
    background: #0d0d0d;
    color: #e8e8e8;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f5c842;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  /* ---- The main layout: controls on left, grid in middle, info on right ---- */
  .app-layout {
    display: grid;
    grid-template-columns: 200px 1fr 220px;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ---- Panel boxes (sidebar sections) ---- */
  .panel {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 14px;
  }

  .panel h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f5c842;
    margin-bottom: 12px;
    border-bottom: 1px solid #333;
    padding-bottom: 6px;
  }

  /* ---- Number inputs for grid size ---- */
  .input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 12px;
    color: #aaa;
  }

  .input-row input {
    width: 52px;
    background: #111;
    border: 1px solid #444;
    color: #f5c842;
    font-family: inherit;
    font-size: 13px;
    padding: 4px 6px;
    border-radius: 4px;
    text-align: center;
  }

  /* ---- Buttons ---- */
  .btn {
    display: block;
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    background: #1e1e1e;
    border: 1px solid #555;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
    transition: background 0.15s, border-color 0.15s;
  }

  .btn:hover { background: #2a2a2a; border-color: #f5c842; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: #f5c842;
    color: #111;
    border-color: #f5c842;
    font-weight: bold;
  }
  .btn-primary:hover { background: #ffd966; }

  /* ---- The grid wrapper ---- */
  .grid-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* ---- The actual Wumpus grid ---- */
  #wumpus-grid {
    display: grid;
    gap: 3px;
    /* grid-template-columns set dynamically in JS */
  }

  /* ---- Each cell in the grid ---- */
  .cell {
    width: 72px;
    height: 72px;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    user-select: none;
  }

  /* Cell color states — this is the main visual feedback */
  .cell.unknown   { background: #1e1e1e; color: #555; }
  .cell.safe      { background: #1a3a1a; border-color: #2d6b2d; color: #5fba5f; }
  .cell.visited   { background: #0f2a0f; border-color: #1e4d1e; color: #4aaa4a; }
  .cell.inferred-pit    { background: #3a0d0d; border-color: #7a1a1a; color: #f07070; }
  .cell.inferred-wumpus { background: #3a200d; border-color: #7a4a1a; color: #f09050; }
  .cell.confirmed-pit   { background: #5a0a0a; border-color: #cc2222; color: #ff6666; }
  .cell.agent     { background: #1a1a3a; border-color: #4444aa; color: #8888ff; }
  .cell.current   { border: 2px solid #f5c842 !important; }

  /* The little coordinate label in top-left of cell */
  .cell .coord {
    position: absolute;
    top: 2px;
    left: 4px;
    font-size: 8px;
    color: #444;
  }

  /* Emoji icons inside the cell */
  .cell .icon { font-size: 20px; line-height: 1; }
  .cell .percept-label { font-size: 8px; margin-top: 2px; letter-spacing: 0.5px; }

  /* ---- Status / log area below grid ---- */
  #status-bar {
    font-size: 11px;
    color: #888;
    text-align: center;
    min-height: 18px;
  }

  /* ---- Right side panels ---- */
  .metric-box {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 8px;
    text-align: center;
  }

  .metric-box .metric-val {
    font-size: 28px;
    font-weight: bold;
    color: #f5c842;
  }

  .metric-box .metric-label {
    font-size: 10px;
    color: #666;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ---- Percept list ---- */
  .percept-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 5px 0;
    border-bottom: 1px solid #222;
    color: #aaa;
  }
  .percept-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-breeze  { background: #4488ff; }
  .dot-stench  { background: #88cc44; }
  .dot-glitter { background: #ffcc00; }
  .dot-none    { background: #444; }

  /* ---- KB log ---- */
  #kb-log {
    font-size: 10px;
    color: #555;
    max-height: 180px;
    overflow-y: auto;
    line-height: 1.8;
  }
  #kb-log .kb-entry { color: #777; }
  #kb-log .kb-entry.new { color: #aaa; }

  /* ---- Legend ---- */
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #888;
    margin-bottom: 6px;
  }
  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ---- Game over overlay inside grid area ---- */
  #game-message {
    display: none;
    background: #111;
    border: 1px solid #f5c842;
    border-radius: 6px;
    padding: 14px;
    text-align: center;
    font-size: 13px;
    color: #f5c842;
    letter-spacing: 1px;
  }

  /* Scroll for narrow screens */
  @media (max-width: 780px) {
    .app-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>⚠ Wumpus World</h1>
<p class="subtitle">knowledge-based propositional logic agent</p>

<div class="app-layout">

  <!-- ========== LEFT SIDEBAR: CONTROLS ========== -->
  <div>
    <div class="panel">
      <h3>Setup</h3>

      <div class="input-row">
        <span>Rows</span>
        <input type="number" id="inp-rows" value="4" min="3" max="8" />
      </div>
      <div class="input-row">
        <span>Cols</span>
        <input type="number" id="inp-cols" value="4" min="3" max="8" />
      </div>
      <div class="input-row">
        <span>Pits</span>
        <input type="number" id="inp-pits" value="3" min="1" max="6" />
      </div>

      <button class="btn btn-primary" id="btn-new">New Game</button>
      <button class="btn" id="btn-step" disabled>Step Agent</button>
      <button class="btn" id="btn-auto" disabled>Auto Run</button>
    </div>

    <!-- Legend -->
    <div class="panel" style="margin-top:12px">
      <h3>Legend</h3>
      <div class="legend-item"><div class="legend-swatch" style="background:#1a3a1a;border:1px solid #2d6b2d"></div> Safe (proved)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#0f2a0f;border:1px solid #1e4d1e"></div> Visited</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#1a1a3a;border:1px solid #4444aa"></div> Agent here</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#1e1e1e;border:1px solid #2a2a2a"></div> Unknown</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#3a0d0d;border:1px solid #7a1a1a"></div> Suspected pit</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#3a200d;border:1px solid #7a4a1a"></div> Suspected wumpus</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#5a0a0a;border:1px solid #cc2222"></div> Confirmed pit</div>
    </div>
  </div>

  <!-- ========== MIDDLE: THE GRID ========== -->
  <div class="grid-wrapper">
    <div id="wumpus-grid"></div>
    <div id="game-message"></div>
    <div id="status-bar">Press "New Game" to start</div>
  </div>

  <!-- ========== RIGHT SIDEBAR: METRICS ========== -->
  <div>
    <!-- Metric counters -->
    <div class="metric-box">
      <div class="metric-val" id="m-steps">0</div>
      <div class="metric-label">Inference Steps</div>
    </div>
    <div class="metric-box">
      <div class="metric-val" id="m-moves">0</div>
      <div class="metric-label">Agent Moves</div>
    </div>
    <div class="metric-box">
      <div class="metric-val" id="m-kb">0</div>
      <div class="metric-label">KB Clauses</div>
    </div>

    <!-- Current percepts panel -->
    <div class="panel" style="margin-top:12px">
      <h3>Active Percepts</h3>
      <div id="percept-list">
        <div class="percept-item"><div class="dot dot-none"></div>None</div>
      </div>
    </div>

    <!-- KB log -->
    <div class="panel" style="margin-top:12px">
      <h3>KB Log</h3>
      <div id="kb-log"><span style="color:#444">— waiting —</span></div>
    </div>
  </div>

</div>

<script>
// =====================================================================
// WUMPUS WORLD — KNOWLEDGE-BASED AGENT
// Written by a junior dev — comments explain what I was thinking :)
// =====================================================================

// --- Game state object. Everything lives here ---
let G = {};

// Auto-run timer reference
let autoTimer = null;

// --- Entry point: start a new game ---
function newGame() {
  // Stop any running auto mode
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }

  const rows = parseInt(document.getElementById('inp-rows').value);
  const cols = parseInt(document.getElementById('inp-cols').value);
  const numPits = parseInt(document.getElementById('inp-pits').value);

  // Build fresh game state
  G = {
    rows, cols, numPits,

    // The real grid (agent can't see this directly)
    pitAt: {},      // key "r,c" => true if pit
    wumpusPos: null, // [r,c]
    goldPos: null,   // [r,c]

    // Agent knowledge
    agentPos: [rows - 1, 0], // start bottom-left (row indexed from top, 0=top)
    visited: {},    // cells the agent has been to
    safe: {},       // cells proved safe by resolution
    suspectedPit: {},    // cells KB suspects have pits
    suspectedWumpus: {}, // cells KB suspects have wumpus
    confirmedPit: {},    // cells confirmed as pits
    wumpusAlive: true,

    // Knowledge Base: list of CNF clause arrays
    // Each clause is an array of literal strings like "P_2_3" or "!P_2_3"
    kb: [],

    // Metrics
    inferenceSteps: 0,
    agentMoves: 0,

    // For BFS / move planning
    toVisit: [],  // planned cells to visit next
    done: false,
  };

  // Randomly place the wumpus (not at start cell)
  G.wumpusPos = randomCellExcluding([[rows-1, 0]], rows, cols);

  // Randomly place pits (not at start, not at wumpus)
  const excluded = [[rows-1, 0], G.wumpusPos];
  for (let i = 0; i < numPits; i++) {
    const p = randomCellExcluding(excluded, rows, cols);
    if (p) {
      G.pitAt[cellKey(p)] = true;
      excluded.push(p);
    }
  }

  // Gold somewhere (not at start)
  G.goldPos = randomCellExcluding([[rows-1, 0]], rows, cols);

  // Mark start as visited and safe
  const startKey = cellKey(G.agentPos);
  G.visited[startKey] = true;
  G.safe[startKey] = true;

  // Agent perceives the start cell and updates KB
  perceiveAndUpdateKB(G.agentPos);

  // Plan what to visit next (safe unvisited neighbors)
  planNextMoves();

  // Update UI
  resetMetrics();
  renderGrid();
  renderPercepts(G.agentPos);
  setStatus('Game started. Agent at ' + posLabel(G.agentPos));

  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-auto').disabled = false;
  document.getElementById('game-message').style.display = 'none';
  document.getElementById('btn-auto').textContent = 'Auto Run';
}

// =====================================================================
// PERCEPTION: what does the agent feel at a cell?
// =====================================================================
function getPercepts(pos) {
  const [r, c] = pos;
  const percepts = [];

  // Check all 4 neighbors
  const neighbors = getNeighbors(r, c);
  let breeze = false, stench = false;

  for (const [nr, nc] of neighbors) {
    if (G.pitAt[cellKey([nr, nc])]) breeze = true;
    if (G.wumpusPos && G.wumpusPos[0] === nr && G.wumpusPos[1] === nc) stench = true;
  }

  if (breeze)  percepts.push('BREEZE');
  if (stench)  percepts.push('STENCH');

  // Glitter if gold is here
  if (G.goldPos && G.goldPos[0] === r && G.goldPos[1] === c) percepts.push('GLITTER');
  if (!breeze && !stench) percepts.push('NONE');

  return percepts;
}

// =====================================================================
// KB UPDATE: TELL the KB about this cell's percepts
// This translates percepts into propositional logic clauses (CNF form)
// =====================================================================
function perceiveAndUpdateKB(pos) {
  const [r, c] = pos;
  const percepts = getPercepts(pos);
  const neighbors = getNeighbors(r, c);
  const key = cellKey(pos);

  // TELL: This cell is safe (agent is here and alive)
  addClause([`SAFE_${r}_${c}`]);
  logKB(`TELL: SAFE_${r}_${c}`, true);

  if (percepts.includes('BREEZE')) {
    // Breeze here means at least one neighbor has a pit
    // B_r_c <=> (P_n1 OR P_n2 OR ...)
    // We split into two directions:
    // Forward: B_r_c => (P_n1 OR P_n2 ...)  encoded as (!B OR P_n1 OR P_n2 ...)
    // Backward: each P_ni => B_r_c  (but we handle this implicitly)

    // The main clause: if breeze, at least one neighbor is a pit
    const clause = [`!B_${r}_${c}`];
    for (const [nr, nc] of neighbors) {
      clause.push(`P_${nr}_${nc}`);
    }
    addClause(clause); // (!B_r_c OR P_n1 OR P_n2 ...)

    // Assert that there IS a breeze here
    addClause([`B_${r}_${c}`]);
    logKB(`TELL: B_${r}_${c} => pit in {${neighbors.map(n=>posLabel(n)).join(',')}}`, true);

    // For each neighbor: if that neighbor is a pit, breeze here
    // P_ni => B_r_c  becomes (!P_ni OR B_r_c)
    for (const [nr, nc] of neighbors) {
      addClause([`!P_${nr}_${nc}`, `B_${r}_${c}`]);
    }

  } else {
    // No breeze => NO pit in any neighbor (this is the easy deduction!)
    addClause([`!B_${r}_${c}`]);
    for (const [nr, nc] of neighbors) {
      // !P_ni is now provable — just add it directly
      addClause([`!P_${nr}_${nc}`]);
      G.safe[cellKey([nr, nc])] = true; // proved safe
      logKB(`TELL: !P_${nr}_${nc} (no breeze at ${posLabel(pos)})`, true);
    }
  }

  if (percepts.includes('STENCH')) {
    const clause = [`!S_${r}_${c}`];
    for (const [nr, nc] of neighbors) {
      clause.push(`W_${nr}_${nc}`);
    }
    addClause(clause);
    addClause([`S_${r}_${c}`]);
    logKB(`TELL: S_${r}_${c} => wumpus in {${neighbors.map(n=>posLabel(n)).join(',')}}`, true);

    for (const [nr, nc] of neighbors) {
      addClause([`!W_${nr}_${nc}`, `S_${r}_${c}`]);
    }
  } else {
    addClause([`!S_${r}_${c}`]);
    if (G.wumpusAlive) {
      for (const [nr, nc] of neighbors) {
        addClause([`!W_${nr}_${nc}`]);
        logKB(`TELL: !W_${nr}_${nc} (no stench at ${posLabel(pos)})`, true);
      }
    }
  }
}

// =====================================================================
// RESOLUTION REFUTATION:
// To prove a query Q, we add !Q to the KB and try to derive a contradiction
// If we get an empty clause (false), the query is proved!
//
// This is the core "inference engine" — resolution refutation in CNF.
// =====================================================================
function askKB(query) {
  // query is like "!P_2_3" (we want to prove there's no pit at 2,3)
  // Negate the query and add to a temporary KB copy
  const negatedQuery = negateLiteral(query);

  // Copy existing clauses
  const clauses = G.kb.map(c => [...c]);
  clauses.push([negatedQuery]); // add !query

  // Keep trying to resolve until we derive [] (empty = contradiction) or no progress
  let changed = true;
  let steps = 0;

  while (changed) {
    changed = false;
    steps++;
    G.inferenceSteps++;

    // Try all pairs of clauses
    for (let i = 0; i < clauses.length; i++) {
      for (let j = i + 1; j < clauses.length; j++) {
        const resolvents = resolve(clauses[i], clauses[j]);

        for (const res of resolvents) {
          // Empty clause = contradiction! Query is proved.
          if (res.length === 0) {
            logKB(`ASK: ${query} — PROVED (${steps} steps)`);
            return true;
          }

          // Add new clause if we haven't seen it before
          if (!clauseExists(clauses, res)) {
            clauses.push(res);
            changed = true;
          }
        }

        // Safety valve — don't loop forever on complex grids
        if (steps > 2000) break;
      }
      if (steps > 2000) break;
    }
  }

  logKB(`ASK: ${query} — cannot prove`);
  return false; // can't prove it
}

// Resolve two CNF clauses against each other
// Returns array of resolvents (new clauses derived)
function resolve(c1, c2) {
  const results = [];
  for (const lit of c1) {
    const negLit = negateLiteral(lit);
    if (c2.includes(negLit)) {
      // We found a complementary pair — resolve!
      const newClause = [
        ...c1.filter(l => l !== lit),
        ...c2.filter(l => l !== negLit)
      ];
      // Remove duplicates and tautologies (if both P and !P appear, discard)
      const deduped = [...new Set(newClause)];
      const isTautology = deduped.some(l => deduped.includes(negateLiteral(l)));
      if (!isTautology) results.push(deduped);
    }
  }
  return results;
}

// Flip the negation on a literal
// "P_1_2" => "!P_1_2" and "!P_1_2" => "P_1_2"
function negateLiteral(lit) {
  return lit.startsWith('!') ? lit.slice(1) : '!' + lit;
}

// Check if a clause already exists in the set (to avoid duplicates)
function clauseExists(clauses, newClause) {
  const sortedNew = [...newClause].sort().join(',');
  return clauses.some(c => [...c].sort().join(',') === sortedNew);
}

// Add a clause to the KB (if not already there)
function addClause(clause) {
  if (!clauseExists(G.kb, clause)) {
    G.kb.push(clause);
    updateKBCount();
  }
}

// =====================================================================
// AGENT DECISION MAKING: where to move next?
// =====================================================================
function planNextMoves() {
  const [r, c] = G.agentPos;
  const neighbors = getNeighbors(r, c);

  // For each unvisited neighbor, ask if it's safe
  for (const [nr, nc] of neighbors) {
    const nKey = cellKey([nr, nc]);
    if (G.visited[nKey] || G.done) continue;

    // Try to prove it's safe using resolution
    const nopit   = askKB(`!P_${nr}_${nc}`);
    const nowumpus = askKB(`!W_${nr}_${nc}`);

    if (nopit && nowumpus) {
      G.safe[nKey] = true;
      // Add to visit list if not already there
      if (!G.toVisit.find(p => cellKey(p) === nKey)) {
        G.toVisit.push([nr, nc]);
      }
    } else {
      // Can't prove safe — mark as suspected danger
      if (!nopit)    G.suspectedPit[nKey] = true;
      if (!nowumpus) G.suspectedWumpus[nKey] = true;
    }
  }
}

// Take one step: move the agent to the next planned cell
function stepAgent() {
  if (G.done) return;

  // If nothing safe to visit, try frontier cells we haven't proved yet
  // (This is where a smarter agent would reason about risk, we just stop for now)
  if (G.toVisit.length === 0) {
    planNextMoves(); // try again with fresh KB
  }

  if (G.toVisit.length === 0) {
    setStatus('Agent: no safe moves found. Exploration complete.');
    G.done = true;
    showGameMessage('🔍 Exploration Complete', 'No more provably safe cells to visit.');
    endGame();
    return;
  }

  // Pick the next cell from the queue
  const next = G.toVisit.shift();
  moveAgentTo(next);
}

function moveAgentTo(pos) {
  const [r, c] = pos;
  const key = cellKey(pos);

  G.agentMoves++;

  // Check if agent falls into a pit or meets wumpus
  if (G.pitAt[key]) {
    G.confirmedPit[key] = true;
    G.done = true;
    renderGrid();
    setStatus('💀 Agent fell into a pit!');
    showGameMessage('💀 Game Over', 'Agent fell into a pit at ' + posLabel(pos));
    endGame();
    return;
  }

  if (G.wumpusPos && G.wumpusPos[0] === r && G.wumpusPos[1] === c && G.wumpusAlive) {
    G.done = true;
    renderGrid();
    setStatus('☠ Agent eaten by the Wumpus!');
    showGameMessage('☠ Game Over', 'Wumpus got the agent at ' + posLabel(pos));
    endGame();
    return;
  }

  // Check if agent found the gold
  if (G.goldPos && G.goldPos[0] === r && G.goldPos[1] === c) {
    G.agentPos = pos;
    G.visited[key] = true;
    G.safe[key] = true;
    renderGrid();
    setStatus('🏆 Agent found the GOLD!');
    showGameMessage('🏆 Victory!', 'Gold found at ' + posLabel(pos) + ' in ' + G.agentMoves + ' moves!');
    G.done = true;
    endGame();
    return;
  }

  // Normal move — update state
  G.agentPos = pos;
  G.visited[key] = true;
  G.safe[key] = true;

  // Remove from suspected lists since we survived
  delete G.suspectedPit[key];
  delete G.suspectedWumpus[key];

  // Perceive the new cell and update KB
  perceiveAndUpdateKB(pos);
  planNextMoves();

  // Update UI
  renderGrid();
  renderPercepts(pos);
  renderMoves();
  setStatus('Agent moved to ' + posLabel(pos));
}

// =====================================================================
// UI RENDERING
// =====================================================================
function renderGrid() {
  const grid = document.getElementById('wumpus-grid');
  grid.style.gridTemplateColumns = `repeat(${G.cols}, 72px)`;
  grid.innerHTML = '';

  for (let r = 0; r < G.rows; r++) {
    for (let c = 0; c < G.cols; c++) {
      const pos = [r, c];
      const key = cellKey(pos);

      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.title = `(${r},${c})`;

      // Coordinate label
      const coordEl = document.createElement('div');
      coordEl.className = 'coord';
      coordEl.textContent = `${r},${c}`;
      cell.appendChild(coordEl);

      // Figure out what this cell looks like to the agent
      const isAgent    = G.agentPos[0] === r && G.agentPos[1] === c;
      const isVisited  = G.visited[key];
      const isSafe     = G.safe[key];
      const isConfPit  = G.confirmedPit[key];
      const isSuspPit  = G.suspectedPit[key];
      const isSuspWump = G.suspectedWumpus[key];

      const iconEl = document.createElement('div');
      iconEl.className = 'icon';

      const labelEl = document.createElement('div');
      labelEl.className = 'percept-label';

      if (isAgent) {
        cell.classList.add('agent', 'current');
        iconEl.textContent = '🤖';
        labelEl.textContent = 'AGENT';
      } else if (isConfPit) {
        cell.classList.add('confirmed-pit');
        iconEl.textContent = '🕳';
        labelEl.textContent = 'PIT';
      } else if (isVisited) {
        cell.classList.add('visited');
        // Show percept indicators for visited cells
        const percepts = getPercepts(pos);
        if (percepts.includes('BREEZE') && percepts.includes('STENCH')) {
          iconEl.textContent = '💨🐛'; labelEl.textContent = 'B+S';
        } else if (percepts.includes('BREEZE')) {
          iconEl.textContent = '💨'; labelEl.textContent = 'BREEZE';
        } else if (percepts.includes('STENCH')) {
          iconEl.textContent = '🐛'; labelEl.textContent = 'STENCH';
        } else if (percepts.includes('GLITTER')) {
          iconEl.textContent = '✨'; labelEl.textContent = 'GOLD';
        } else {
          iconEl.textContent = '✓'; labelEl.textContent = 'CLEAR';
        }
      } else if (isSafe) {
        cell.classList.add('safe');
        iconEl.textContent = '✓'; labelEl.textContent = 'SAFE';
      } else if (isConfPit) {
        cell.classList.add('confirmed-pit');
        iconEl.textContent = '🕳'; labelEl.textContent = 'PIT!';
      } else if (isSuspPit && isSuspWump) {
        cell.classList.add('inferred-pit');
        iconEl.textContent = '⚠'; labelEl.textContent = '?PIT+W';
      } else if (isSuspPit) {
        cell.classList.add('inferred-pit');
        iconEl.textContent = '⚠'; labelEl.textContent = '?PIT';
      } else if (isSuspWump) {
        cell.classList.add('inferred-wumpus');
        iconEl.textContent = '⚠'; labelEl.textContent = '?WUMP';
      } else {
        cell.classList.add('unknown');
        iconEl.textContent = '?'; labelEl.textContent = 'UNKNOWN';
      }

      cell.appendChild(iconEl);
      cell.appendChild(labelEl);
      grid.appendChild(cell);
    }
  }
}

function renderPercepts(pos) {
  const percepts = getPercepts(pos);
  const list = document.getElementById('percept-list');
  list.innerHTML = '';

  const dotMap = { BREEZE: 'dot-breeze', STENCH: 'dot-stench', GLITTER: 'dot-glitter', NONE: 'dot-none' };

  for (const p of percepts) {
    const item = document.createElement('div');
    item.className = 'percept-item';
    item.innerHTML = `<div class="dot ${dotMap[p] || 'dot-none'}"></div>${p}`;
    list.appendChild(item);
  }
}

function renderMoves() {
  document.getElementById('m-moves').textContent = G.agentMoves;
  document.getElementById('m-steps').textContent = G.inferenceSteps;
}

function resetMetrics() {
  document.getElementById('m-moves').textContent = '0';
  document.getElementById('m-steps').textContent = '0';
  document.getElementById('m-kb').textContent = '0';
  document.getElementById('kb-log').innerHTML = '<span style="color:#444">— new game —</span>';
}

function updateKBCount() {
  if (G.kb) document.getElementById('m-kb').textContent = G.kb.length;
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

function showGameMessage(title, body) {
  const el = document.getElementById('game-message');
  el.innerHTML = `<strong>${title}</strong><br><span style="font-size:11px;color:#aaa">${body}</span>`;
  el.style.display = 'block';
}

function logKB(msg, isNew) {
  const log = document.getElementById('kb-log');
  const entry = document.createElement('div');
  entry.className = 'kb-entry' + (isNew ? ' new' : '');
  entry.textContent = msg;
  log.insertBefore(entry, log.firstChild);

  // Keep log from getting too long
  while (log.children.length > 40) log.removeChild(log.lastChild);

  // Update inference step display
  document.getElementById('m-steps').textContent = G.inferenceSteps;
}

// Called when game ends — disable step/auto buttons
function endGame() {
  document.getElementById('btn-step').disabled = true;
  document.getElementById('btn-auto').disabled = true;
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

// =====================================================================
// HELPERS
// =====================================================================

// Get valid neighbors (up, down, left, right — no diagonals in Wumpus World)
function getNeighbors(r, c) {
  const neighbors = [];
  if (r > 0)          neighbors.push([r-1, c]);
  if (r < G.rows - 1) neighbors.push([r+1, c]);
  if (c > 0)          neighbors.push([r, c-1]);
  if (c < G.cols - 1) neighbors.push([r, c+1]);
  return neighbors;
}

// Convert [r,c] to string key for object lookups
function cellKey(pos) { return `${pos[0]},${pos[1]}`; }

// Human-readable cell label like "(2,3)"
function posLabel(pos) { return `(${pos[0]},${pos[1]})`; }

// Pick a random cell not in the excluded list
function randomCellExcluding(excluded, rows, cols) {
  const excludeKeys = excluded.map(p => cellKey(p));
  const available = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (!excludeKeys.includes(cellKey([r, c]))) available.push([r, c]);
    }
  }
  if (available.length === 0) return null;
  return available[Math.floor(Math.random() * available.length)];
}

// =====================================================================
// BUTTON WIRING
// =====================================================================

document.getElementById('btn-new').addEventListener('click', newGame);

document.getElementById('btn-step').addEventListener('click', () => {
  if (!G.done) {
    stepAgent();
    renderMoves();
  }
});

document.getElementById('btn-auto').addEventListener('click', function() {
  if (autoTimer) {
    // Already running — pause it
    clearInterval(autoTimer);
    autoTimer = null;
    this.textContent = 'Auto Run';
    return;
  }
  // Start auto-stepping at 600ms intervals
  this.textContent = 'Pause';
  autoTimer = setInterval(() => {
    if (G.done) {
      clearInterval(autoTimer);
      autoTimer = null;
      document.getElementById('btn-auto').textContent = 'Auto Run';
    } else {
      stepAgent();
      renderMoves();
    }
  }, 600);
});

// Kick off a default game so there's something to look at on load
newGame();
</script>
